<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tidrapport Elite v11.4</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --primary: #00d2ff; --secondary: #3a7bd5;
            --danger: #ff5e62; --card: rgba(30, 41, 59, 0.8); 
            --text: #f8fafc; --input-bg: rgba(51, 65, 85, 0.5);
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 15px; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: var(--text); min-height: 100vh;
        }
        .container { max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 24px; backdrop-filter: blur(10px); border: 1px solid var(--border); margin-bottom: 20px; }
        h1 { font-size: 1.5rem; text-align: center; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        label { font-weight: 700; display: block; margin-top: 12px; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; }
        input, textarea, select { display: block; margin-top: 5px; width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-size: 16px; background: var(--input-bg); color: white; text-align: center; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .time-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        .btn-group { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; cursor: pointer; border: none; border-radius: 14px; font-weight: 800; transition: 0.2s; }
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; grid-column: span 2; }
        .btn-main:disabled { opacity: 0.3; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
        .btn-csv { background: #10b981; color: white; grid-column: span 2; margin-top: 10px; }

        /* Sparade rader */
        .row-card { background: var(--card); margin-top: 10px; padding: 15px; border-radius: 18px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .row-info { text-align: left; }
        .row-ao { font-weight: 800; color: var(--primary); }
        .row-desc { font-size: 0.85rem; color: #94a3b8; }
        .action-btns { display: flex; gap: 8px; }
        .circle-btn { width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .edit-bg { background: rgba(0, 210, 255, 0.1); color: var(--primary); }
        .delete-bg { background: rgba(255, 94, 98, 0.1); color: var(--danger); }
        
        .total-box { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 15px; display: flex; justify-content: space-between; border: 1px solid var(--primary); font-weight: 800; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <h1>TIDRAPPORT v11.4</h1>
    
    <div class="card">
        <form id="form">
            <label>Utförare</label>
            <input type="text" id="namn" placeholder="Namn" oninput="validate()">
            
            <div class="grid-2">
                <div><label>Datum</label><input type="date" id="datum" oninput="validate()"></div>
                <div><label>AO / Projekt</label><input type="text" id="ao" placeholder="AO" oninput="validate()"></div>
            </div>

            <label>Arbetsbeskrivning</label>
            <textarea id="beskrivning" rows="2" placeholder="Beskrivning..." oninput="validate()"></textarea>

            <div class="time-row">
                <div><label>Start</label><input type="time" id="start" value="07:00" oninput="validate()"></div>
                <div><label>Lunch (h)</label>
                    <select id="lunch" oninput="validate()">
                        <option value="0">0</option><option value="0.5">0.5</option><option value="1" selected>1.0</option>
                    </select>
                </div>
                <div><label>Slut</label><input type="time" id="slut" value="16:00" oninput="validate()"></div>
            </div>

            <div class="total-box"><span>Beräknad tid:</span> <span id="tidDisp">0.00 h</span></div>

            <div class="btn-group">
                <button type="button" class="btn-main" id="saveBtn" onclick="sparaRad()" disabled>SPARA RAD</button>
                <button type="button" class="btn-secondary" onclick="clearForm()">RENSA</button>
                <button type="button" class="btn-csv" onclick="exportCSV()">SKICKA CSV (EXCEL)</button>
            </div>
        </form>
    </div>

    <div id="lista"></div>
</div>

<script>
    let rapporter = [];
    let editIndex = -1;

    function init() {
        const sparadData = localStorage.getItem('rapporter_v11');
        if (sparadData) rapporter = JSON.parse(sparadData);
        document.getElementById('namn').value = localStorage.getItem('namn') || '';
        document.getElementById('datum').valueAsDate = new Date();
        renderaLista();
        validate();
    }

    function validate() {
        const start = document.getElementById('start').value;
        const slut = document.getElementById('slut').value;
        const lunch = parseFloat(document.getElementById('lunch').value);
        
        let timmar = 0;
        if (start && slut) {
            const d1 = new Date("2000-01-01 " + start);
            const d2 = new Date("2000-01-01 " + slut);
            timmar = (d2 - d1) / 1000 / 60 / 60 - lunch;
        }
        
        const t = timmar > 0 ? timmar.toFixed(2) : "0.00";
        document.getElementById('tidDisp').innerText = t + " h";
        
        const formOk = document.getElementById('namn').value && document.getElementById('ao').value && timmar > 0;
        document.getElementById('saveBtn').disabled = !formOk;
        localStorage.setItem('namn', document.getElementById('namn').value);
        return t;
    }

    function sparaRad() {
        const nyRad = {
            datum: document.getElementById('datum').value,
            ao: document.getElementById('ao').value,
            besk: document.getElementById('beskrivning').value,
            tid: document.getElementById('tidDisp').innerText
        };

        if (editIndex > -1) {
            rapporter[editIndex] = nyRad;
            editIndex = -1;
            document.getElementById('saveBtn').innerText = "SPARA RAD";
        } else {
            rapporter.push(nyRad);
        }

        localStorage.setItem('rapporter_v11', JSON.stringify(rapporter));
        clearForm();
        renderaLista();
    }

    function renderaLista() {
        const div = document.getElementById('lista');
        div.innerHTML = '';
        rapporter.forEach((r, i) => {
            div.innerHTML += `
                <div class="row-card">
                    <div class="row-info">
                        <div class="row-ao">${r.ao} <span style="font-size:0.7rem; color:#94a3b8;">(${r.datum})</span></div>
                        <div class="row-desc">${r.besk}</div>
                        <div style="font-weight:bold; color:var(--primary)">${r.tid}</div>
                    </div>
                    <div class="action-btns">
                        <button class="circle-btn edit-bg" onclick="editRad(${i})">✎</button>
                        <button class="circle-btn delete-bg" onclick="raderaRad(${i})">✕</button>
                    </div>
                </div>`;
        });
    }

    function raderaRad(i) {
        if(confirm("Radera?")) {
            rapporter.splice(i, 1);
            localStorage.setItem('rapporter_v11', JSON.stringify(rapporter));
            renderaLista();
        }
    }

    function editRad(i) {
        const r = rapporter[i];
        document.getElementById('datum').value = r.datum;
        document.getElementById('ao').value = r.ao;
        document.getElementById('beskrivning').value = r.besk;
        editIndex = i;
        document.getElementById('saveBtn').innerText = "UPPDATERA RAD";
        window.scrollTo(0,0);
        validate();
    }

    function clearForm() {
        document.getElementById('ao').value = '';
        document.getElementById('beskrivning').value = '';
        validate();
    }

    function exportCSV() {
        if (rapporter.length === 0) return alert("Ingen data att skicka!");
        let csv = "Datum,AO,Beskrivning,Tid\n";
        rapporter.forEach(r => {
            csv += `${r.datum},${r.ao},"${r.besk}",${r.tid}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "tidrapport.csv");
        link.click();
    }
</script>
</body>
</html>
