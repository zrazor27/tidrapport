<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tidrapport Elite v15.5</title>
    <style>
        :root { 
            --primary: #00d2ff; --secondary: #3a7bd5;
            --danger: #ff5e62; --warning: #fb8500; --success: #10b981;
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); 
            --text: #f8fafc; --input-bg: rgba(51, 65, 85, 0.4);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: var(--text); margin: 0; padding: 10px; min-height: 100vh; }

        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .container { max-width: 500px; margin: auto; display: none; padding-bottom: 100px; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; backdrop-filter: blur(12px); border: 1px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.3); margin-bottom: 15px; position: relative; }
        
        .settings-icon { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 1.4rem; opacity: 0.7; z-index: 10; }
        
        #settings-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 350px; background: #1e293b; border: 1px solid var(--primary); border-radius: 20px; padding: 20px; z-index: 20000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 15000; }

        .footer-copyright { text-align: center; font-size: 0.7rem; color: #64748b; margin-top: 20px; letter-spacing: 0.5px; }

        .required::after { content: " *"; color: var(--danger); font-size: 1.1rem; }
        label { font-weight: 700; display: block; margin-top: 12px; font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--border); background: var(--input-bg); color: white; margin-top: 5px; font-size: 15px; outline: none; transition: all 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .btn-opt { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); padding: 10px; width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; font-weight: 600; }
        
        .row-card { background: var(--card); margin-top: 12px; padding: 16px; border-radius: 18px; border: 1px solid var(--border); position: relative; }
        .row-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .row-utforare { font-size: 0.75rem; color: var(--primary); font-weight: 800; }
        .del-icon { color: var(--danger); cursor: pointer; font-size: 1.1rem; margin-left: 10px; }

        .row-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
        .row-desc { font-size: 0.85rem; color: #94a3b8; margin-top: 8px; font-style: italic; border-top: 1px solid var(--border); padding-top: 8px; }
        
        #summary-box { background: linear-gradient(135deg, #10b981, #059669); padding: 15px; border-radius: 18px; text-align: center; font-weight: 800; margin: 20px 0 5px 0; }
    </style>
</head>
<body onload="init()">

<div class="modal-overlay" id="overlay" onclick="toggleSettings()"></div>
<div id="settings-modal">
    <h3 style="margin-top:0; text-align:center; color:var(--primary);">INSTÄLLNINGAR</h3>
    <button class="btn-opt" onclick="changePin()">Byt PIN-kod</button>
    <button class="btn-opt" onclick="secureExport()" style="border-color: var(--success); color: var(--success);">📥 Exportera CSV</button>
    
    <input type="file" id="csv-import" accept=".csv" style="display:none" onchange="importCSV(this)">
    <button class="btn-opt" onclick="document.getElementById('csv-import').click()" style="border-color: var(--primary); color: var(--primary);">📤 Importera CSV</button>

    <button class="btn-opt" onclick="rensaAllaRader()" style="border-color: var(--danger); color: var(--danger); font-weight: 800; margin-top: 20px;">🔒 BACKUP & RENSA ALLA</button>
    
    <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
    <button class="btn-opt" onclick="location.reload()" style="color: #94a3b8;">Logga ut</button>
    <button class="btn-main" onclick="toggleSettings()">STÄNG</button>
</div>

<div id="login-screen">
    <div class="card" style="width: 320px;">
        <h2 style="text-align:center; margin-top: 0;">LOGGA IN</h2>
        <label class="required">Användare (För- och efternamn)</label>
        <input type="text" id="login-user" placeholder="sven svensson">
        <label>Säkerhetskod (Standard: 1234)</label>
        <input type="password" id="login-pin" placeholder="••••" inputmode="numeric">
        <button class="btn-main" onclick="attemptLogin()">LÅS UPP</button>
        <div class="footer-copyright">Copyright 2026 Jörgen Nyström</div>
    </div>
</div>

<div class="container" id="app-content">
    <div class="card">
        <span class="settings-icon" onclick="toggleSettings()">⚙️</span>
        <h1 style="text-align:center; font-size: 1.4rem; margin:0 0 10px 0;">TIDRAPPORT ELITE</h1>
        
        <label class="required">Utförare</label>
        <div style="display: flex; gap: 8px; margin-bottom: 15px;">
            <input type="text" id="utforare" readonly style="flex-grow: 1; margin-top: 0; background: rgba(255,255,255,0.05); color: #94a3b8;">
            <button onclick="raderaUtforare()" style="background: var(--danger); border: none; border-radius: 12px; padding: 0 15px; cursor: pointer; color: white; font-weight: bold; font-size: 0.7rem;">RADERA</button>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <button type="button" class="btn-opt" onclick="kopieraSenasteRaden()" style="background: rgba(16, 185, 129, 0.1); border-color: var(--success); color: var(--success); font-size: 0.7rem; margin-top: 0;">📅 HÄMTA IGÅR</button>
            <button type="button" class="btn-opt" onclick="rensaFormular()" style="background: rgba(255, 94, 98, 0.1); border-color: var(--danger); color: var(--danger); font-size: 0.7rem; margin-top: 0;">🧹 TÖM FORMULÄR</button>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Datum</label><input type="date" id="datum"></div>
            <div>
                <label class="required">AO-Nummer</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="ao" placeholder="AO" style="flex-grow: 1;">
                    <button onclick="document.getElementById('ao').value=''; localStorage.removeItem('senaste_ao');" style="margin-top: 5px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: white; padding: 0 10px;">✕</button>
                </div>
            </div>
        </div>
        
        <label class="required">Arbetsbeskrivning</label>
        <div style="position: relative;">
            <textarea id="beskrivning" rows="2" placeholder="Vad har utförts?"></textarea>
            <button onclick="document.getElementById('beskrivning').value=''; localStorage.removeItem('senaste_beskrivning');" style="position: absolute; top: 12px; right: 10px; background: rgba(0,0,0,0.3); border: none; border-radius: 50%; color: white; width: 25px; height: 25px; cursor: pointer;">✕</button>
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <div><label>Start</label><input type="time" id="start" value="07:00" onchange="kollaAutomatiskRast()"></div>
            <div><label>Slut</label><input type="time" id="slut" value="16:00" onchange="kollaAutomatiskRast()"></div>
            <div>
                <label>Lunch</label>
                <select id="lunch">
                    <option value="1">1.0 h</option>
                    <option value="0.5">0.5 h</option>
                    <option value="0">0 h</option>
                </select>
                <div id="lunch-warning" style="display:none; color: var(--danger); font-size: 0.5rem; font-weight: bold; margin-top: 4px;">⚠️ RAST KRÄVS >5H</div>
            </div>
        </div>
        <button class="btn-main" onclick="sparaRad()">SPARA RAD</button>
        <button id="btn-avbryt" class="btn-opt" onclick="avbrytRedigering()" style="display: none; background: rgba(255,255,255,0.1); border-color: #64748b; margin-top: 8px;">✖ AVBRYT REDIGERING</button>
    </div>

    <div id="lista-container"></div>
    <div id="summary-box">Total tid: 0.00 h</div>
    <div id="week-summary" style="text-align: center; font-size: 0.85rem; color: var(--primary); font-weight: 700; margin-bottom: 20px;">Veckototal: 0.00 h</div>
    <div class="footer-copyright">Copyright 2026 Jörgen Nyström</div>
</div>

<script>
let rader = JSON.parse(localStorage.getItem("tider_v15_5")) || [];
let redigeraIndex = -1;

function capitalizeName(str) {
    if(!str) return "";
    return str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
}

function init() {
    if(!localStorage.getItem("app_pin")) localStorage.setItem("app_pin", "1234");
    const user = localStorage.getItem("utforare_namn");
    if(user) {
        document.getElementById("utforare").value = capitalizeName(user);
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
    }
    const sparatAo = localStorage.getItem("senaste_ao");
    if(sparatAo) document.getElementById("ao").value = sparatAo;
    const sparadBesk = localStorage.getItem("senaste_beskrivning");
    if(sparadBesk) document.getElementById("beskrivning").value = sparadBesk;
    document.getElementById("datum").valueAsDate = new Date();
    renderaLista();
}

function attemptLogin() {
    let userField = document.getElementById("login-user");
    let user = userField.value.trim();
    const pin = document.getElementById("login-pin").value;
    if(user.split(' ').filter(n => n).length < 2) return alert("Ange för- och efternamn.");
    if(pin === (localStorage.getItem("app_pin") || "1234")) {
        localStorage.setItem("utforare_namn", user);
        init();
    } else alert("Fel PIN!");
}

function raderaUtforare() {
    if(confirm("Radera sparad utförare?")) {
        localStorage.removeItem("utforare_namn");
        location.reload();
    }
}

function raknaUtTimmar() {
    const s = document.getElementById("start").value, e = document.getElementById("slut").value, l = parseFloat(document.getElementById("lunch").value);
    const start = new Date(`2026-01-01T${s}`);
    let slut = new Date(`2026-01-01T${e}`);
    if (slut < start) slut.setDate(slut.getDate() + 1);
    return ((slut - start) / (3600000) - l).toFixed(2);
}

function kollaAutomatiskRast() {
    const s = document.getElementById("start").value, e = document.getElementById("slut").value;
    const lVal = document.getElementById("lunch"), warn = document.getElementById("lunch-warning");
    const start = new Date(`2026-01-01T${s}`);
    let slut = new Date(`2026-01-01T${e}`);
    if (slut < start) slut.setDate(slut.getDate() + 1);
    const diff = (slut - start) / 3600000;
    if (diff >= 5) {
        if(lVal.value === "0") lVal.value = "1";
        warn.style.display = (lVal.value === "0") ? "block" : "none";
    } else { warn.style.display = "none"; }
}

function sparaRad() {
    const nyRad = {
        utforare: document.getElementById("utforare").value,
        datum: document.getElementById("datum").value,
        ao: document.getElementById("ao").value,
        beskrivning: document.getElementById("beskrivning").value,
        start: document.getElementById("start").value,
        slut: document.getElementById("slut").value,
        lunch: document.getElementById("lunch").value,
        timmar: raknaUtTimmar()
    };
    if (redigeraIndex > -1) { rader[redigeraIndex] = nyRad; avbrytRedigering(); }
    else { rader.push(nyRad); }
    localStorage.setItem("tider_v15_5", JSON.stringify(rader));
    localStorage.setItem("senaste_ao", nyRad.ao);
    localStorage.setItem("senaste_beskrivning", nyRad.beskrivning);
    renderaLista();
}

function redigeraRad(index) {
    const r = rader[index]; redigeraIndex = index;
    document.getElementById("datum").value = r.datum;
    document.getElementById("ao").value = r.ao;
    document.getElementById("beskrivning").value = r.beskrivning;
    document.getElementById("start").value = r.start;
    document.getElementById("slut").value = r.slut;
    document.getElementById("lunch").value = r.lunch;
    const btn = document.querySelector(".btn-main");
    btn.innerText = "UPPDATERA RAD " + (index + 1);
    btn.style.background = "linear-gradient(135deg, var(--warning), var(--danger))";
    document.getElementById("btn-avbryt").style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function avbrytRedigering() {
    redigeraIndex = -1;
    const btn = document.querySelector(".btn-main");
    btn.innerText = "SPARA RAD";
    btn.style.background = "linear-gradient(135deg, var(--primary), var(--secondary))";
    document.getElementById("btn-avbryt").style.display = "none";
}

function kopieraRad(index) {
    const r = rader[index];
    document.getElementById("ao").value = r.ao;
    document.getElementById("beskrivning").value = r.beskrivning;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function kopieraSenasteRaden() { if(rader.length > 0) kopieraRad(rader.length - 1); }

function rensaFormular() {
    if(confirm("Töm formuläret?")) {
        document.getElementById("ao").value = "";
        document.getElementById("beskrivning").value = "";
        localStorage.removeItem("senaste_ao");
        localStorage.removeItem("senaste_beskrivning");
        avbrytRedigering();
    }
}

function raderaRad(index) {
    if(confirm("Radera denna rad?")) {
        rader.splice(index, 1);
        localStorage.setItem("tider_v15_5", JSON.stringify(rader));
        renderaLista();
    }
}

function renderaLista() {
    const container = document.getElementById("lista-container");
    container.innerHTML = "";
    let totalt = 0, veckaTotalt = 0;
    const nuVecka = getWeekNumber(new Date());
    rader.forEach((rad, i) => {
        totalt += parseFloat(rad.timmar);
        if(getWeekNumber(new Date(rad.datum)) === nuVecka) veckaTotalt += parseFloat(rad.timmar);
        container.innerHTML += `
            <div class="row-card">
                <div class="row-top-bar">
                    <span class="row-utforare">${rad.utforare}</span>
                    <div>
                        <span onclick="redigeraRad(${i})">✏️</span>
                        <span onclick="kopieraRad(${i})" style="margin: 0 15px; opacity:0.6;">📋</span>
                        <span class="del-icon" onclick="raderaRad(${i})">🗑️</span>
                    </div>
                </div>
                <div class="row-header">
                    <span>${rad.datum} | AO: ${rad.ao}</span>
                    <span style="color:var(--success)">${rad.timmar} h</span>
                </div>
                <div class="row-desc">${rad.beskrivning} (${rad.start}-${rad.slut}, lunch ${rad.lunch}h)</div>
            </div>`;
    });
    document.getElementById("summary-box").innerText = `Total tid: ${totalt.toFixed(2)} h`;
    document.getElementById("week-summary").innerText = `Veckototal (v.${nuVecka}): ${veckaTotalt.toFixed(2)} h`;
}

function getWeekNumber(d) {
    d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
}

function secureExport() {
    if(rader.length === 0) return alert("Tom lista!");
    let csv = "\uFEFFUtförare;Datum;AO;Beskrivning;Start;Slut;Lunch;Timmar\n";
    rader.forEach(r => { csv += `${r.utforare};${r.datum};${r.ao};"${r.beskrivning}";${r.start};${r.slut};${r.lunch};${r.timmar.replace('.',',')}\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `Tidrapport_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
}

function importCSV(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split('\n');
        for (let i = 1; i < lines.length; i++) {
            if (lines[i].trim() === "") continue;
            const cols = lines[i].split(';');
            if (cols.length >= 8) {
                rader.push({ utforare: cols[0].replace(/"/g, ''), datum: cols[1], ao: cols[2], beskrivning: cols[3].replace(/"/g, ''), start: cols[4], slut: cols[5], lunch: cols[6], timmar: cols[7].replace(',', '.').trim() });
            }
        }
        localStorage.setItem("tider_v15_5", JSON.stringify(rader));
        renderaLista();
        alert("Import klar!");
        toggleSettings();
    };
    reader.readAsText(file, "UTF-8");
}

function rensaAllaRader() {
    const pin = prompt("Ange PIN för att BACKUP-RENSA:");
    if(pin === (localStorage.getItem("app_pin") || "1234")) {
        if(confirm("Backup laddas ner och listan töms. Fortsätta?")) {
            secureExport(); rader = [];
            localStorage.setItem("tider_v15_5", JSON.stringify(rader));
            renderaLista(); toggleSettings();
        }
    } else if(pin !== null) alert("Fel PIN!");
}

function toggleSettings() {
    const m = document.getElementById("settings-modal"), o = document.getElementById("overlay");
    const s = m.style.display === "block";
    m.style.display = s ? "none" : "block"; o.style.display = s ? "none" : "block";
}

function changePin() {
    const old = prompt("Gammal PIN:");
    if(old === (localStorage.getItem("app_pin") || "1234")) {
        const ny = prompt("Ny 4-siffrig PIN:");
        if(ny && ny.length === 4) { localStorage.setItem("app_pin", ny); alert("Klart!"); }
    }
}
</script>
</body>
</html>
