<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tidrapport Elite v15.5</title>
    <style>
        :root { 
            --primary: #00d2ff; --secondary: #3a7bd5;
            --danger: #ff5e62; --warning: #fb8500; --success: #10b981;
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); 
            --text: #f8fafc; --input-bg: rgba(51, 65, 85, 0.4);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top right, #1e293b, #0f172a); color: var(--text); margin: 0; padding: 10px; min-height: 100vh; }

        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .container { max-width: 500px; margin: auto; display: none; padding-bottom: 100px; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; backdrop-filter: blur(12px); border: 1px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.3); margin-bottom: 15px; position: relative; }
        
        .settings-icon { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 1.4rem; opacity: 0.7; z-index: 10; }
        
        #settings-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 350px; background: #1e293b; border: 1px solid var(--primary); border-radius: 20px; padding: 20px; z-index: 20000; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 15000; }

        .footer-copyright { text-align: center; font-size: 0.7rem; color: #64748b; margin-top: 20px; letter-spacing: 0.5px; }

        .required::after { content: " *"; color: var(--danger); font-size: 1.1rem; }
        .error-field { border: 2px solid var(--danger) !important; animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        label { font-weight: 700; display: block; margin-top: 12px; font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--border); background: var(--input-bg); color: white; margin-top: 5px; font-size: 15px; outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .btn-opt { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); padding: 10px; width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; font-weight: 600; }
        
        .row-card { background: var(--card); margin-top: 12px; padding: 16px; border-radius: 18px; border: 1px solid var(--border); position: relative; }
        .row-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .row-utforare { font-size: 0.75rem; color: var(--primary); font-weight: 800; }
        .del-icon { color: var(--danger); cursor: pointer; font-size: 1.1rem; }

        .row-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; }
        .row-desc { font-size: 0.85rem; color: #94a3b8; margin-top: 8px; font-style: italic; border-top: 1px solid var(--border); padding-top: 8px; }
        
        #summary-box { background: linear-gradient(135deg, #10b981, #059669); padding: 15px; border-radius: 18px; text-align: center; font-weight: 800; margin: 20px 0; }
    </style>
</head>
<body onload="init()">

<div class="modal-overlay" id="overlay" onclick="toggleSettings()"></div>
<div id="settings-modal">
    <h3 style="margin-top:0; text-align:center; color:var(--primary);">INSTÄLLNINGAR</h3>
    <button class="btn-opt" onclick="changePin()">Byt PIN-kod</button>
    <button class="btn-opt" onclick="secureExport()" style="border-color: var(--success); color: var(--success);">📥 Exportera CSV</button>
    <button class="btn-opt" onclick="location.reload()" style="border-color: var(--danger); color: var(--danger);">Logga ut</button>
    <button class="btn-main" onclick="toggleSettings()">STÄNG</button>
</div>

<div id="login-screen">
    <div class="card" style="width: 320px;">
        <h2 style="text-align:center; margin-top: 0;">LOGGA IN</h2>
        <label class="required">Användare (För- och efternamn)</label>
        <input type="text" id="login-user" placeholder="sven svensson">
        <label>Säkerhetskod (Standard: 1234)</label>
        <input type="password" id="login-pin" placeholder="••••" inputmode="numeric">
        <button class="btn-main" onclick="attemptLogin()">LÅS UPP</button>
        <div class="footer-copyright">Copyright 2026 Jörgen Nyström</div>
    </div>
</div>

<div class="container" id="app-content">
    <div class="card">
        <span class="settings-icon" onclick="toggleSettings()">⚙️</span>
        <h1 style="text-align:center; font-size: 1.4rem; margin:0 0 10px 0;">TIDRAPPORT ELITE</h1>
        
        <label class="required">Utförare</label>
        <input type="text" id="utforare" readonly>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Datum</label><input type="date" id="datum"></div>
            <div><label class="required">AO-Nummer</label><input type="text" id="ao" placeholder="AO"></div>
        </div>
        
        <label class="required">Arbetsbeskrivning</label>
        <textarea id="beskrivning" rows="2" placeholder="Vad har utförts?"></textarea>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <div><label>Start</label><input type="time" id="start" value="07:00"></div>
            <div><label>Slut</label><input type="time" id="slut" value="16:00"></div>
            <div><label>Lunch</label>
                <select id="lunch">
                    <option value="1">1.0 h</option>
                    <option value="0.5">0.5 h</option>
                    <option value="0">0 h</option>
                </select>
            </div>
        </div>
        <button class="btn-main" onclick="sparaRad()">SPARA RAD</button>
    </div>

    <div id="lista-container"></div>
    <div id="summary-box">Total tid: 0.00 h</div>
    <div class="footer-copyright">Copyright 2026 Jörgen Nyström</div>
</div>

<script>
let rader = JSON.parse(localStorage.getItem("tider_v15_5")) || [];

function capitalizeName(str) {
    if(!str) return "";
    return str.toLowerCase().split(' ').map(word => 
        word.charAt(0).toUpperCase() + word.slice(1)
    ).join(' ');
}

function init() {
    if(!localStorage.getItem("app_pin")) localStorage.setItem("app_pin", "1234");
    const user = localStorage.getItem("utforare_namn");
    if(user) {
        document.getElementById("login-user").value = user;
    }
    document.getElementById("datum").valueAsDate = new Date();
    renderaLista();
}

function attemptLogin() {
    let userField = document.getElementById("login-user");
    let user = userField.value.trim();
    const pin = document.getElementById("login-pin").value;
    
    userField.classList.remove("error-field");

    if(user.split(' ').filter(n => n).length < 2) {
        userField.classList.add("error-field");
        alert("Vänligen ange både för- och efternamn.");
        return;
    }

    if(pin === localStorage.getItem("app_pin")) {
        user = capitalizeName(user);
        localStorage.setItem("utforare_namn", user);
        document.getElementById("utforare").value = user;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app-content").style.display = "block";
    } else {
        alert("Fel PIN-kod!");
    }
}

function toggleSettings() {
    const modal = document.getElementById("settings-modal");
    const overlay = document.getElementById("overlay");
    const isVisible = modal.style.display === "block";
    modal.style.display = isVisible ? "none" : "block";
    overlay.style.display = isVisible ? "none" : "block";
}

function changePin() {
    const nyPin = prompt("Ange ny 4-siffrig PIN-kod:");
    if(nyPin && nyPin.length >= 4) {
        localStorage.setItem("app_pin", nyPin);
        alert("PIN-kod ändrad!");
    }
}

function sparaRad() {
    const ao = document.getElementById("ao").value.trim();
    const besk = document.getElementById("beskrivning").value.trim();
    
    if(!ao || !besk) {
        alert("Fyll i AO-nummer och beskrivning!");
        return;
    }

    const start = document.getElementById("start").value;
    const slut = document.getElementById("slut").value;
    const lunch = parseFloat(document.getElementById("lunch").value);
    
    const [h1, m1] = start.split(':').map(Number);
    const [h2, m2] = slut.split(':').map(Number);
    const diffMinuter = (h2 * 60 + m2) - (h1 * 60 + m1);
    const timmar = (diffMinuter / 60) - lunch;

    const nyRad = {
        id: Date.now(),
        utforare: document.getElementById("utforare").value,
        datum: document.getElementById("datum").value,
        ao: ao,
        beskrivning: besk,
        tid: timmar.toFixed(2)
    };

    rader.unshift(nyRad);
    localStorage.setItem("tider_v15_5", JSON.stringify(rader));
    document.getElementById("ao").value = "";
    document.getElementById("beskrivning").value = "";
    renderaLista();
}

function raderaRad(id) {
    if(confirm("Vill du radera denna rad?")) {
        rader = rader.filter(r => r.id !== id);
        localStorage.setItem("tider_v15_5", JSON.stringify(rader));
        renderaLista();
    }
}

function renderaLista() {
    const container = document.getElementById("lista-container");
    container.innerHTML = "";
    let total = 0;

    rader.forEach(rad => {
        total += parseFloat(rad.tid);
        container.innerHTML += `
            <div class="row-card">
                <div class="row-top-bar">
                    <span class="row-utforare">${rad.utforare}</span>
                    <span class="del-icon" onclick="raderaRad(${rad.id})">🗑️</span>
                </div>
                <div class="row-header">
                    <span>${rad.datum} | AO: ${rad.ao}</span>
                    <span style="color:var(--primary)">${rad.tid} h</span>
                </div>
                <div class="row-desc">${rad.beskrivning}</div>
            </div>
        `;
    });
    document.getElementById("summary-box").innerText = `Total tid: ${total.toFixed(2)} h`;
}

function secureExport() {
    if(rader.length === 0) return alert("Ingen data att exportera.");
    let csv = "Datum,Utförare,AO,Beskrivning,Timmar\n";
    rader.forEach(r => {
        csv += `${r.datum},${r.utforare},${r.ao},"${r.beskrivning}",${r.tid}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `Tidrapport_${new Date().toLocaleDateString()}.csv`;
    link.click();
}
</script>
</body>
</html>
