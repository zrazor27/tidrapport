<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tidrapport Elite v14.2</title>
    <style>
        :root { 
            --primary: #00d2ff; --secondary: #3a7bd5;
            --danger: #ff5e62; --warning: #fb8500; --success: #10b981;
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); 
            --text: #f8fafc; --input-bg: rgba(51, 65, 85, 0.4);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: var(--text); min-height: 100vh;
        }

        .container { max-width: 500px; margin: auto; padding: 15px; }
        h1 { text-align: center; font-size: 1.6rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
        
        .card { background: var(--card); padding: 20px; border-radius: 24px; backdrop-filter: blur(12px); border: 1px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.3); margin-bottom: 20px; }
        label { font-weight: 700; display: block; margin-top: 12px; font-size: 0.65rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; }
        
        .input-with-action { position: relative; display: flex; align-items: center; }
        .clear-btn { position: absolute; right: 10px; background: rgba(255,255,255,0.1); border: none; border-radius: 8px; color: var(--danger); cursor: pointer; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        input, textarea, select { display: block; margin-top: 4px; width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px; font-size: 15px; background: var(--input-bg); color: white; text-align: center; transition: 0.3s; }
        
        .val-error { border-color: var(--danger) !important; background: rgba(255, 94, 98, 0.05); }
        .val-success { border-color: var(--success) !important; background: rgba(16, 185, 129, 0.05); }

        #holiday-msg { font-size: 0.7rem; font-weight: 800; text-align: center; margin-top: 5px; min-height: 1.2em; }
        .text-orange { color: var(--warning) !important; }
        .text-red { color: var(--danger) !important; }

        .btn-group { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 14px; cursor: pointer; border: none; border-radius: 14px; font-weight: 800; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; grid-column: span 2; }
        button:disabled { opacity: 0.15; filter: grayscale(1); cursor: not-allowed; }
        .btn-success { background: var(--success); color: white; grid-column: span 2; }
        .btn-danger { background: rgba(255, 94, 98, 0.1); color: var(--danger); border: 1px solid rgba(255, 94, 98, 0.2); }

        .row-card { background: var(--card); margin-top: 12px; padding: 15px; border-radius: 18px; border: 1px solid var(--border); border-left: 6px solid var(--primary); }
        .row-card.is-orange { border-left-color: var(--warning); }
        .row-card.is-red { border-left-color: var(--danger); }
        
        .row-top { display: flex; justify-content: space-between; font-weight: 800; font-size: 0.85rem; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 8px; }
        .row-info { font-size: 0.75rem; line-height: 1.5; color: #cbd5e1; }
        
        .action-btns { display: flex; gap: 8px; margin-top: 10px; }
        .circle-btn { width: 34px; height: 34px; border-radius: 10px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-del { color: var(--danger); background: rgba(255,94,98,0.15); }
        .btn-edit { color: var(--primary); background: rgba(0,210,255,0.15); }

        .summary-card { background: linear-gradient(135deg, #10b981, #059669); padding: 15px; border-radius: 20px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.2); }
        table { width: 100%; border-collapse: collapse; color: white; font-size: 0.75rem; }
        .sum-total { font-weight: 900; border-top: 2px solid #fff; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <h1>TIDRAPPORT ELITE</h1>
    
    <div class="card">
        <form id="form">
            <label>Utförare (För- & Efternamn) *</label>
            <div class="input-with-action">
                <input type="text" id="namn" placeholder="Förnamn Efternamn" oninput="validate()">
                <button type="button" class="clear-btn" onclick="clearInp('namn')">✕</button>
            </div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>
                    <label>Datum *</label>
                    <input type="date" id="datum" oninput="validate()">
                    <div id="holiday-msg"></div>
                </div>
                <div><label>AO / Projekt *</label><input type="text" id="ao" placeholder="AO-nr" oninput="validate()"></div>
            </div>

            <label>Arbetsbeskrivning *</label>
            <textarea id="beskrivning" rows="2" placeholder="Vad har utförts?" oninput="validate()"></textarea>

            <label>Förbrukning (Max 20 rader)</label>
            <textarea id="material" rows="3" placeholder="En artikel per rad..." oninput="validate()"></textarea>

            <div style="display:grid; grid-template-columns: 1fr 1fr 1.2fr; gap:10px;">
                <div><label>Start</label><input type="time" id="start" value="07:00" oninput="validate()"></div>
                <div><label>Slut</label><input type="time" id="slut" value="16:00" oninput="validate()"></div>
                <div><label>Lunch (h)</label>
                    <select id="lunch" oninput="validate()">
                        <option value="0">0</option>
                        <option value="0.5">0.5</option>
                        <option value="1" selected>1.0</option>
                    </select>
                </div>
            </div>

            <div id="tidDisp" style="text-align:center; margin: 15px 0; font-weight:900; color:var(--primary); font-size:1.2rem; border: 1px solid var(--border); padding: 10px; border-radius: 12px;">8.00 h</div>

            <div class="btn-group">
                <button type="button" class="btn-main" id="saveBtn" onclick="sparaRad()">SPARA RAD</button>
                <button type="button" class="btn-success" id="exportBtn" onclick="handleCSVExport()">EXPORTERA CSV 🔒</button>
                <button type="button" class="btn-danger" id="clearBtn" onclick="authAction('clear')">RENSA ALLT 🔒</button>
            </div>
        </form>
    </div>

    <div id="lista-container"></div>
    <div id="summary-container"></div>
</div>

<script>
const CODES = { export: "1234", clear: "0000" };

function init() {
    const idag = new Date().toISOString().split('T');
    document.getElementById('datum').value = idag[0];
    const user = localStorage.getItem("utforare");
    if(user) document.getElementById("namn").value = user;
    renderList();
    validate();
}

function clearInp(id) { document.getElementById(id).value = ""; validate(); }

function validate() {
    const n = document.getElementById("namn"), a = document.getElementById("ao"), d = document.getElementById("beskrivning"), m = document.getElementById("material");
    const nameWords = n.value.trim().split(/\s+/).filter(w => w.length >= 2);
    const nameOk = nameWords.length >= 2, aoOk = a.value.trim().length >= 1, descOk = d.value.trim().length >= 3;
    const matOk = m.value.split('\n').filter(l => l.trim().length > 0).length <= 20;

    n.className = nameOk ? "val-success" : (n.value.length > 0 ? "val-error" : "");
    a.className = aoOk ? "val-success" : (a.value.length > 0 ? "val-error" : "");
    d.className = descOk ? "val-success" : (d.value.length > 0 ? "val-error" : "");
    m.className = matOk ? (m.value.length > 0 ? "val-success" : "") : "val-error";

    const date = new Date(document.getElementById("datum").value);
    const msg = document.getElementById("holiday-msg"), day = date.getDay(); 
    msg.className = ""; msg.innerText = "";
    let cTag = "";
    if(day === 6) { msg.innerText = "LÖRDAG"; msg.className = "text-orange"; cTag = "orange"; }
    else if(day === 0) { msg.innerText = "SÖNDAG / RÖD DAG"; msg.className = "text-red"; cTag = "red"; }

    const [sh, sm] = document.getElementById("start").value.split(':').map(Number);
    const [eh, em] = document.getElementById("slut").value.split(':').map(Number);
    const lunch = parseFloat(document.getElementById("lunch").value);
    const totalMins = (eh * 60 + em) - (sh * 60 + sm);
    const hrs = Math.max(0, (totalMins / 60) - lunch);
    document.getElementById("tidDisp").innerText = hrs.toFixed(2) + " h";

    const hasData = JSON.parse(localStorage.getItem("tidrader") || "[]").length > 0;
    document.getElementById("saveBtn").disabled = (!nameOk || !aoOk || !descOk || !matOk || hrs <= 0);
    document.getElementById("exportBtn").disabled = (!nameOk || !hasData);
    
    return { hrs, cTag };
}

function sparaRad() {
    const v = validate();
    const rad = {
        namn: document.getElementById("namn").value.trim(),
        datum: document.getElementById("datum").value,
        ao: document.getElementById("ao").value.trim(),
        beskrivning: document.getElementById("beskrivning").value.trim(),
        material: document.getElementById("material").value.trim(),
        tid: v.hrs, color: v.cTag, start: document.getElementById("start").value, slut: document.getElementById("slut").value, lunch: document.getElementById("lunch").value
    };
    localStorage.setItem("utforare", rad.namn);
    let rader = JSON.parse(localStorage.getItem("tidrader") || "[]");
    rader.push(rad);
    localStorage.setItem("tidrader", JSON.stringify(rader));
    ["ao", "beskrivning", "material"].forEach(id => document.getElementById(id).value = "");
    renderList(); validate();
}

function renderList() {
    const rader = JSON.parse(localStorage.getItem("tidrader") || "[]");
    let html = "";
    rader.forEach((r, i) => {
        const cls = r.color === 'orange' ? 'is-orange' : (r.color === 'red' ? 'is-red' : '');
        html += `<div class="row-card ${cls}"><div class="row-top"><span>AO: ${r.ao}</span><span style="color:var(--primary)">${r.tid.toFixed(2)} h</span></div><div class="row-info"><strong>Utförare:</strong> ${r.namn}<br><strong>Datum:</strong> ${r.datum}<br><strong>Tid:</strong> ${r.start}-${r.slut}<br><strong>Jobb:</strong> ${r.beskrivning}</div><div class="action-btns"><button class="circle-btn btn-edit" onclick="editR(${i})">✎</button><button class="circle-btn btn-del" onclick="delR(${i})">✕</button></div></div>`;
    });
    document.getElementById("lista-container").innerHTML = html;
    const group = rader.reduce((acc, r) => { acc[r.ao] = (acc[r.ao] || 0) + r.tid; return acc; }, {});
    let sHtml = "";
    if(rader.length > 0) {
        sHtml = `<div class="summary-card"><table><thead><tr><th>AO</th><th style="text-align:right;">TIMMAR</th></tr></thead><tbody>`;
        let tot = 0;
        for (const [ao, t] of Object.entries(group)) { tot += t; sHtml += `<tr><td>${ao}</td><td style="text-align:right;">${t.toFixed(2)} h</td></tr>`; }
        sHtml += `<tr class="sum-total"><td>TOTALT</td><td style="text-align:right;">${tot.toFixed(2)} h</td></tr></tbody></table></div>`;
    }
    document.getElementById("summary-container").innerHTML = sHtml;
}

function handleCSVExport() {
    const p = prompt("Ange PIN för CSV-export:");
    if(p !== CODES.export) return alert("Fel kod!");
    
    const rader = JSON.parse(localStorage.getItem("tidrader") || "[]");
    const namn = document.getElementById("namn").value;

    let csvContent = "\ufeff"; 
    csvContent += "AO;Utförare;Datum;Arbetsbeskrivning;Material;Start;Slut;Lunch;Timmar\n";

    rader.forEach(r => {
        const row = [
            r.ao,
            r.namn,
            r.datum,
            r.beskrivning.replace(/;/g, ","), 
            r.material.replace(/\n/g, " ").replace(/;/g, ","),
            r.start,
            r.slut,
            r.lunch,
            r.tid.toFixed(2).replace(".", ",") 
        ];
        csvContent += row.join(";") + "\n";
    });

    const totalt = rader.reduce((sum, r) => sum + r.tid, 0);
    csvContent += `\n;;;;;;;TOTALT;${totalt.toFixed(2).replace(".", ",")}\n`;

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const dateStr = new Date().toISOString().slice(0,10);
    const fileName = `Tidrapport_${namn.replace(/\s+/g, '_')}_${dateStr}.csv`;
    
    link.href = URL.createObjectURL(blob);
    link.setAttribute("download", fileName);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    setTimeout(() => {
        if(confirm("CSV-fil sparad! Vill du rensa listan nu?")) {
            localStorage.removeItem("tidrader");
            renderList(); validate();
        }
    }, 1000);
}

function authAction(t) {
    const p = prompt(`PIN för rensning:`);
    if(p === CODES[t]) {
        if(confirm("Rensa allt?")) { localStorage.removeItem("tidrader"); renderList(); validate(); }
    } else alert("Fel kod!");
}

function delR(i) {
    if(confirm("Ta bort raden?")) {
        let r = JSON.parse(localStorage.getItem("tidrader") || "[]");
        r.splice(i, 1);
        localStorage.setItem("tidrader", JSON.stringify(r));
        renderList(); validate();
    }
}

function editR(i) {
    let rader = JSON.parse(localStorage.getItem("tidrader") || "[]");
    const r = rader[i];
    ["datum", "ao", "beskrivning", "material", "start", "slut", "lunch"].forEach(id => {
        if(document.getElementById(id)) document.getElementById(id).value = r[id];
    });
    rader.splice(i, 1);
    localStorage.setItem("tidrader", JSON.stringify(rader));
    renderList(); validate();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
