<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tidrapport Elite v11.4</title>
    
    <!-- PWA & Mobil-inställningar -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            --primary: #00d2ff; --secondary: #3a7bd5;
            --success: #00f2fe; --danger: #ff5e62; --warning: #fb8500;
            --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); 
            --text: #f8fafc; --input-bg: rgba(51, 65, 85, 0.5);
            --border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 20px 15px; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: var(--text); min-height: 100vh; text-align: center;
        }
        .container { max-width: 500px; margin: auto; }
        .header h1 { margin-bottom: 20px; font-size: 1.8rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: var(--card); padding: 25px; border-radius: 28px; backdrop-filter: blur(10px); border: 1px solid var(--border); }
        label { font-weight: 700; display: block; margin-top: 15px; font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; }
        input, textarea, select { display: block; margin-top: 8px; width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 16px; font-size: 16px; background: var(--input-bg); color: white; text-align: center; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .time-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-group { margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 18px; cursor: pointer; border: none; border-radius: 18px; font-weight: 800; transition: 0.3s; }
        .btn-main { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; grid-column: span 2; }
        .btn-main:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body onload="init()">

<div class="container">
    <div class="header"><h1>TIDRAPPORT <span>v11.4</span></h1></div>
    <div class="card">
        <form id="form">
            <label>Utförare *</label>
            <input type="text" id="namn" placeholder="Ditt namn" required oninput="validate()">
            
            <div class="grid-2">
                <div>
                    <label>Datum *</label>
                    <input type="date" id="datum" oninput="validate()">
                </div>
                <div><label>AO / Projekt *</label><input type="text" id="ao" placeholder="AO-nummer" required oninput="validate()"></div>
            </div>

            <label>Arbetsbeskrivning *</label>
            <textarea id="beskrivning" rows="2" placeholder="Vad har utförts?" oninput="validate()"></textarea>
            
            <div class="time-row">
                <div><label>Start</label><input type="time" id="start" value="07:00" oninput="validate()"></div>
                <div>
                    <label>Lunch (h)</label>
                    <select id="lunch" oninput="validate()">
                        <option value="0">0</option>
                        <option value="0.5">0.5</option>
                        <option value="1" selected>1.0</option>
                    </select>
                </div>
                <div><label>Slut</label><input type="time" id="slut" value="16:00" oninput="validate()"></div>
            </div>

            <label>Total tid (timmar)</label>
            <input type="text" id="tid" readonly style="border:none; font-size: 1.6rem; background: transparent; color: var(--primary);">

            <div class="btn-group">
                <button type="button" class="btn-main" id="saveBtn" onclick="sparaRad()" disabled>SPARA RAPPORT</button>
                <button type="button" class="btn-secondary" onclick="clearAll()">RENSA</button>
            </div>
        </form>
    </div>
</div>

<script>
    function init() {
        // Ladda sparat namn
        const sparatNamn = localStorage.getItem('utforare');
        if (sparatNamn) document.getElementById('namn').value = sparatNamn;
        
        // Sätt dagens datum som standard
        document.getElementById('datum').valueAsDate = new Date();
        validate();
    }

    function validate() {
        const namn = document.getElementById('namn').value;
        const ao = document.getElementById('ao').value;
        const besk = document.getElementById('beskrivning').value;
        const start = document.getElementById('start').value;
        const slut = document.getElementById('slut').value;
        const lunch = parseFloat(document.getElementById('lunch').value);

        // Beräkna tid
        if (start && slut) {
            const s = start.split(':');
            const e = slut.split(':');
            const startMin = parseInt(s[0]) * 60 + parseInt(s[1]);
            const slutMin = parseInt(e[0]) * 60 + parseInt(e[1]);
            let diff = (slutMin - startMin) / 60;
            diff = diff - lunch;
            document.getElementById('tid').value = diff > 0 ? diff.toFixed(2) : "0.00";
        }

        // Aktivera knapp
        const isValid = namn && ao && besk && document.getElementById('tid').value > 0;
        document.getElementById('saveBtn').disabled = !isValid;
        
        // Spara namn lokalt
        localStorage.setItem('utforare', namn);
    }

    function sparaRad() {
        alert("Rapport sparad lokalt! (Här kan du lägga till funktion för att skicka PDF/E-post)");
    }

    function clearAll() {
        if(confirm("Vill du rensa formuläret?")) {
            document.getElementById('form').reset();
            init();
        }
    }
</script>

</body>
</html>
